<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FZZAIN RECOND CAR</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial}
.box{max-width:420px;margin:auto;padding:20px}
input,button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px}
button{background:#25d366;color:#fff;font-weight:bold;cursor:pointer}
hr{margin:15px 0}
img{width:100%;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="box">

<h2>🔐 ADMIN LOGIN</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>🚗 ADD CAR</h2>

<input id="name" placeholder="Nama Kereta">
<input id="year" placeholder="Tahun">
<input id="mileage" placeholder="Mileage">
<input id="price" placeholder="Harga">

<!-- UPLOAD IMAGE -->
<input type="file" id="file">
<button onclick="uploadImage()">Upload Gambar</button>

<img id="preview">

<button onclick="addCar()">Simpan Kereta</button>

</div>

<script>

// 🔥 FIREBASE CONFIG (PASTE YOUR OWN)
const firebaseConfig = {
  apiKey: "AIzaSyCCWwtCJWfzt7Ro3goa9jH6sZpmJmx7UhI",
  authDomain: "projectfzzaintp1.firebaseapp.com",
  projectId: "projectfzzaintp1",
  storageBucket: "projectfzzaintp1.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let imageURL = "";

// ================= LOGIN =================
function login(){
auth.signInWithEmailAndPassword(
email.value,
pass.value
)
.then(()=>alert("Login berjaya"))
.catch(e=>alert(e.message));
}

// ================= UPLOAD IMAGE =================
function uploadImage(){

let file = document.getElementById("file").files[0];

if(!file){
alert("Pilih gambar dulu");
return;
}

let ref = storage.ref("cars/" + file.name);

ref.put(file)
.then(snapshot => snapshot.ref.getDownloadURL())
.then(url => {

imageURL = url;

document.getElementById("preview").src = url;

alert("Gambar berjaya upload!");
});

}

// ================= ADD CAR =================
function addCar(){

if(!imageURL){
alert("Sila upload gambar dulu");
return;
}

db.collection("cars").add({
name: name.value,
year: year.value,
mileage: mileage.value,
price: price.value,
image: imageURL
});

alert("Kereta berjaya disimpan!");

name.value = "";
year.value = "";
mileage.value = "";
price.value = "";
file.value = "";
imageURL = "";
document.getElementById("preview").src = "";

}

</script>

</body>
</html>
