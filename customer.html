<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FZZAIN RECOND CAR</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:#1a1a1a;
padding:12px;
margin:10px 0;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
background:#25d366;
color:white;
font-weight:bold;
cursor:pointer;
}

h2{text-align:center;}
hr{margin:20px 0;}
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 DETAIL KERETA</h2>

<div id="list"></div>

<hr>

<h2>📝 APPLY LOAN (WHATSAPP)</h2>

<input id="model" placeholder="🚗 Model Kereta">
<input id="price" placeholder="💰 Harga (RM)">
<input id="name" placeholder="👤 Nama">
<input id="salary" placeholder="💼 Gaji (RM)">

<button onclick="sendWA()">📲 Hantar WhatsApp</button>

</div>

<script>

// ================= SHOWROOM LIST =================
function loadCars(){

let cars = JSON.parse(localStorage.getItem("cars") || "[]");

let list = document.getElementById("list");
list.innerHTML = "";

if(cars.length === 0){
list.innerHTML = "<p>Tiada kereta tersedia</p>";
return;
}

cars.forEach(c=>{

list.innerHTML += `
<div class="card">
<h3>${c.name}</h3>
<p>Year: ${c.year}</p>
<p>Mileage: ${c.mileage}</p>
<p>Price: ${c.price}</p>
<img src="${c.image}">

<!-- AUTO FILL LOAN BUTTON -->
<button onclick="fillLoan('${c.name}','${c.price}')">
📩 Apply Loan untuk kereta ini
</button>

</div>
`;

});

}

loadCars();

// ================= AUTO FILL =================
function fillLoan(model, price){

document.getElementById("model").value = model;
document.getElementById("price").value = price;

window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});

}

// ================= WHATSAPP SEND =================
let phone = "601136756741"; // tukar nombor kau

function sendWA(){

let model = document.getElementById("model").value;
let price = document.getElementById("price").value;
let name = document.getElementById("name").value;
let salary = document.getElementById("salary").value;

if(!model || !price || !name || !salary){
alert("Sila isi semua maklumat");
return;
}

let msg = `
📝 APPLY LOAN REQUEST

🚗 Model : ${model}
💰 Harga : RM${price}

👤 Nama : ${name}
💼 Gaji : RM${salary}

📌 Sila semak kelayakan loan & monthly installment
`;

let url = "https://wa.me/"601136756741"?text=" + encodeURIComponent(msg);

window.open(url, "_blank");

}

</script>

</body>
</html>
