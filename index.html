}

.prev{left:6px;}
.next{right:6px;}

.dots{

}

.dot{

cursor:pointer;

.dot.active{

}

.card h3{

}

.small{

function setActive(btn){
let group=btn.parentNode.querySelectorAll("button");
group.forEach(b=>b.classList.remove("filter-active"));
btn.classList.add("filter-active");
}

function setBrand(b,btn){
currentBrand=b;
setActive(btn);
renderCars();
}

function setYear(y,btn){
currentYear=y;
setActive(btn);
renderCars();

function setColour(c,btn){
currentColour=c;
setActive(btn);
renderCars();
}

function updatePrice(){

let min=+document.getElementById("minPrice").value;
let max=+document.getElementById("maxPrice").value;

if(min>max){
[min,max]=[max,min];
document.getElementById("minPrice").value=min;
document.getElementById("maxPrice").value=max;
}

minPrice=min;
maxPrice=max;

document.getElementById("minVal").innerText=min;
document.getElementById("maxVal").innerText=max;

renderCars();
}

function priceNum(p){
return parseInt(String(p).replace(/,/g,''));
}

function getId(name){
return name.replace(/\s/g,'').replace(/[^\w]/g,'');

/* ===== SLIDER ===== */

function moveSlide(name,dir){

let id=getId(name);

if(sliderState[id]===undefined) sliderState[id]=0;

let total=document.querySelectorAll("#slider-"+id+" img").length;

sliderState[id]+=dir;

if(sliderState[id]<0) sliderState[id]=total-1;
if(sliderState[id]>=total) sliderState[id]=0;

updateSlider(id);
}

function goSlide(name,index){
let id=getId(name);
sliderState[id]=index;
updateSlider(id);
}

function updateSlider(id){

let track=document.querySelector("#slider-"+id+" .slider-track");
if(!track)return;

let index=sliderState[id] || 0;

track.style.transform=`translateX(-${index*100}%)`;

document.querySelectorAll("#dots-"+id+" .dot").forEach((dot,i)=>{
dot.classList.toggle("active",i===index);
});
}

/* ===== AUTO SLIDE SETIAP CARD ===== */

function startAuto(id){

if(autoTimers[id]) clearInterval(autoTimers[id]);

autoTimers[id]=setInterval(()=>{
moveSlide(id,1);
},4000);
}

/* ===== TOUCH INDIVIDUAL ===== */

function attachSwipe(id){

let slider=document.getElementById("slider-"+id);
if(!slider)return;

let startX=0;
let endX=0;

slider.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
},{passive:true});

slider.addEventListener("touchend",(e)=>{
endX=e.changedTouches[0].clientX;

let diff=startX-endX;

if(Math.abs(diff)>50){
if(diff>0) moveSlide(id,1);
else moveSlide(id,-1);
}
},{passive:true});
}

/* ===== RENDER ===== */

function renderCars(){

let search=document.getElementById("search").value.toLowerCase();
let brandSearch=document.getElementById("brandSearch").value.toLowerCase();
let yearSearch=document.getElementById("yearSearch").value;
let colorSearch=document.getElementById("colorSearch").value.toLowerCase();

let filtered=allCars
.filter(car=>{

let price=priceNum(car.price);

let matchSearch=car.name.toLowerCase().includes(search);
let matchBrand=brandSearch=="" || car.brand.toLowerCase().includes(brandSearch);
let matchYear=currentYear=="all" || car.year==currentYear;
let matchColour=colorSearch=="" || car.colour.toLowerCase().includes(colorSearch);

let matchPrice=price>=minPrice*1000 && price<=maxPrice*1000;

let matchBrandBtn=currentBrand=="all" || car.brand==currentBrand;
let matchColourBtn=currentColour=="all" || car.colour==currentColour;

return matchSearch && matchBrand && matchYear && matchColour && matchPrice && matchBrandBtn && matchColourBtn;

})
.sort((a,b)=> priceNum(a.price) - priceNum(b.price));

/* 🔥 INI PART IMPORTANT: SORT HARGA MURAH → MAHAL */
.sort((a,b)=> priceNum(a.price) - priceNum(b.price));

let html="";

filtered.forEach((car,i)=>{

if(!sliderState[i]) sliderState[i]=0;

html+=`
<div class="card">

<div class="slider" id="slider${i}">
<div class="slider-track" style="transform:translateX(-${sliderState[i]*100}%)">
${car.images.map(img=>`<img src="${img}">`).join("")}
</div>

<button class="slider-btn prev" onclick="moveSlide(${i},-1)">❮</button>
<button class="slider-btn next" onclick="moveSlide(${i},1)">❯</button>
</div>

<div class="dots">
${car.images.map((_,d)=>`
<span class="dot ${d==sliderState[i]?'active':''}" onclick="goSlide(${i},${d})"></span>
`).join("")}
</div>

<h2>RM ${car.price}</h2>
<h3>${car.name}</h3>
<p>Brand: ${car.brand}</p>
<p>Year: ${car.year}</p>
<p>Colour: ${car.colour}</p>
<p>Mileage: ${car.mileage}</p>

<button class="loan-btn"
onclick="window.open('https://wa.me/${phone}?text=Saya%20minat%20${encodeURIComponent(car.name)}')">
WhatsApp
</button>

</div>
`;
});

document.getElementById("list").innerHTML=html;
}

timeout(()=>{
attachSwipe(id);
startAuto(id);
updateSlider(id);
},50);

}

});

}

let salary=prompt("Gaji bulanan:");
if(!salary)return;

let msg=`
🚗 APPLY LOAN REQUEST

Model: ${model}
Harga: RM${price}

👤 Nama: ${name}
💼 Gaji: ${salary}

📌 Sila semak kelayakan loan & monthly installment`;

window.location="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
}

renderCars();
