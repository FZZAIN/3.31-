<script>

let phone="601136756741";
let currentBrand="all";
let currentYear="all";

// 🚗 DATA KERETA (MASUK SINI)
let allCars = [
{
name:"BMW M3 Competition",
price:"285000",
brand:"BMW",
year:"2024",
mileage:"12000 km",
image:"https://images.unsplash.com/photo-1555215695-3004980ad54e",
status:"available",
detail:"Full spec, sunroof, leather seat, sport mode"
},
{
name:"Mercedes C200 AMG",
price:"198000",
brand:"Mercedes",
year:"2023",
mileage:"25000 km",
image:"https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8",
status:"available",
detail:"AMG line, full service record"
},
{
name:"Toyota Vellfire",
price:"165000",
brand:"Toyota",
year:"2022",
mileage:"40000 km",
image:"https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6",
status:"sold",
detail:"MPV luxury, 7 seat, family car"
}
];

function goAdmin(){
window.location.href="admin.html";
}

function setBrand(b){
currentBrand=b;
renderCars();
}

function setYear(y){
currentYear=y;
renderCars();
}

function renderCars(){

let list=document.getElementById("list");
let keyword=(document.getElementById("search").value||"").toLowerCase();

list.innerHTML="";

allCars.forEach(c=>{

let brandMatch=(currentBrand==="all" || c.brand===currentBrand);
let yearMatch=(currentYear==="all" || c.year===currentYear);
let searchMatch=(c.name||"").toLowerCase().includes(keyword);

if(brandMatch && yearMatch && searchMatch){

let badge = c.status==="sold"
? `<div class="badge sold">🔴 SOLD</div>`
: `<div class="badge available">🟢 AVAILABLE</div>`;

let button = c.status==="sold"
? `<button class="action" style="background:#555" disabled>SOLD</button>`
: `<button class="action" onclick="applyLoan('${c.name}','${c.price}')">📲 APPLY LOAN</button>`;

list.innerHTML += `
<div class="card">

<img src="${c.image}">

${badge}

<h2>RM ${c.price}</h2>
<h3>${c.name}</h3>

<p>🏷 Brand: ${c.brand}</p>
<p>📅 Tahun: ${c.year}</p>
<p>📊 Mileage: ${c.mileage}</p>
<p>📝 Detail: ${c.detail}</p>

${button}

</div>
`;
}

});

}

function applyLoan(model,price){

let name=prompt("Nama anda:");
if(!name)return;

let salary=prompt("Gaji anda:");
if(!salary)return;

let msg=`
🚗 LOAN REQUEST

Model: ${model}
Harga: RM${price}
Nama: ${name}
Gaji: ${salary}
`;

window.location="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);

}

renderCars();

</script>
