<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FZZAIN RECOND CAR</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
max-width:850px;
margin:auto;
padding:12px;
}

h2{
text-align:center;
font-size:24px;
margin:10px 0 15px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:14px;
}

h4{
margin:10px 0 5px;
font-size:14px;
}

.btn-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-bottom:10px;
}

.btn-group button{
padding:9px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
font-size:12px;
}

.btn-group button:hover{
background:#25d366;
}

.card{
background:#1a1a1a;
padding:12px;
margin:10px 0;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.card h2{
font-size:22px;
color:#25d366;
margin:4px 0;
text-align:left;
}

.card h3{
font-size:17px;
margin:4px 0;
}

.card p{
margin:4px 0;
font-size:13px;
color:#ddd;
}

.loan-btn{
width:100%;
padding:11px;
margin-top:10px;
border:none;
border-radius:8px;
background:#25d366;
color:white;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

.loan-btn:hover{
background:#1fa855;
}

</style>
</head>

<body>

<div class="container">

<h2>🚗 FZZAIN RECOND CAR</h2>

<!-- 🔍 SEARCH -->
<input id="search" placeholder="🔍 Cari kereta..." onkeyup="renderCars()">

<!-- 🏷 BRAND -->
<h4>🏷 Brand</h4>
<div class="btn-group">
<button onclick="setBrand('all')">ALL</button>
<button onclick="setBrand('Mercedes')">Mercedes</button>
<button onclick="setBrand('BMW')">BMW</button>
<button onclick="setBrand('Toyota')">Toyota</button>
<button onclick="setBrand('Honda')">Honda</button>
<button onclick="setBrand('Nissan')">Nissan</button>
<button onclick="setBrand('Mazda')">Mazda</button>
<button onclick="setBrand('Porsche')">Porsche</button>
</div>

<!-- 📅 YEAR -->
<h4>📅 Tahun</h4>
<div class="btn-group">
<button onclick="setYear('all')">ALL</button>
<button onclick="setYear('2026')">2026</button>
<button onclick="setYear('2025')">2025</button>
<button onclick="setYear('2024')">2024</button>
<button onclick="setYear('2023')">2023</button>
<button onclick="setYear('2022')">2022</button>
<button onclick="setYear('2021')">2021</button>
<button onclick="setYear('2020')">2020</button>
</div>

<div id="list"></div>

</div>

<script>

let phone="601136756741";

let currentBrand="all";
let currentYear="all";

let allCars = [
{
name:"MERCEDES BENZ A180 STYLE AMG LINE",
price:"149,000",
brand:"MERCEDES",
year:"2020",
colour:"SILVER",
mileage:"18,950 KM",
image:"https://img.sanishtech.com/u/94395009473bafd984dc513e46e0bdf7.jpeg",
detail:"HALF-LEATHER ,(ORIGINAL) NAVI ,BACK CAMERA"
},
{
name:"VOLKSWAGEN GOLF MK8R 2.0",
price:"240,000",
brand:"Mercedes",
year:"2023",
colour:"BLACK",
mileage:"8,300 KM",
image:"https://img.sanishtech.com/u/2bb5b130ec2bcffd89ed3d8ccaa500b8.jpeg",
detail:"4.5/A, (ORIGINAL) NAVI. TV, BACK CAMERA"
},
{
name:"HONDA ODYSSEY ABSOLUTE HONDA
SENSING ( 8 SEATER",
price:"169,000",
brand:"HONDA",
year:"2021",
mileage:"49,475",
image:"https://img.sanishtech.com/u/e2cbe8ec39fd842f388d22827787b3c7.jpeg",
detail:"5 /B ,(DOP) NAVI. TV ,FLIP DOWN MONITOR, 8-SEATER, MULTI
VIEW MONITOR ,2 POWER SLIDE DOORS (SEAT COVER ON)"
}
];

function setBrand(b){
currentBrand=b;
renderCars();
}

function setYear(y){
currentYear=y;
renderCars();
}

function renderCars(){

let list=document.getElementById("list");
let keyword=(document.getElementById("search").value||"").toLowerCase();

list.innerHTML="";

allCars.forEach(c=>{

let brandMatch=(currentBrand==="all" || c.brand===currentBrand);
let yearMatch=(currentYear==="all" || c.year===currentYear);
let searchMatch=(c.name||"").toLowerCase().includes(keyword);

if(brandMatch && yearMatch && searchMatch){

list.innerHTML += `
<div class="card">

<img src="${c.image}">

<h2>RM ${c.price}</h2>
<h3>${c.name}</h3>

<p>🏷 Brand: ${c.brand}</p>
<p>📅 Tahun: ${c.year}</p>
<p>📊 Mileage: ${c.mileage}</p>
<p>📝 Detail: ${c.detail}</p>

<button class="loan-btn" onclick="applyLoan('${c.name}','${c.price}')">
📲 APPLY LOAN
</button>

</div>
`;
}

});

}

function applyLoan(model,price){

let name=prompt("Nama anda:");
if(!name)return;

let salary=prompt("Gaji bulanan:");
if(!salary)return;

let msg=`
🚗 APPLY LOAN REQUEST

Model: ${model}
Harga: RM${price}

👤 Nama: ${name}
💼 Gaji: RM${salary}
`;

window.location="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
}

renderCars();

</script>

</body>
</html>
