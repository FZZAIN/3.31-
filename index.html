<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FZZAIN DETAIL</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">🚗 FZZAIN CAR DETAIL</div>

<div class="container">

<!-- FEATURED -->
<div class="featured">
<div class="featured-track" id="featuredTrack">

<div class="featured-item">
<img src="images/bmw/1.jpg">
<div class="featured-text">BMW 330I M SPORT</div>
</div>

<div class="featured-item">
<img src="images/a180/1.jpg">
<div class="featured-text">MERCEDES A180 AMG</div>
</div>

<div class="featured-item">
<img src="images/alphard/1.jpg">
<div class="featured-text">TOYOTA ALPHARD VIP</div>
</div>

</div>
</div>

<!-- FILTER -->
<input id="search" placeholder="🔍 Search Car..." onkeyup="renderCars()">

<select id="brandFilter" onchange="renderCars()">
<option value="all">ALL BRAND</option>
<option value="BMW">BMW</option>
<option value="MERCEDES">MERCEDES</option>
<option value="TOYOTA">TOYOTA</option>
<option value="HONDA">HONDA</option>
</select>

<select id="yearFilter" onchange="renderCars()">
<option value="all">ALL YEAR</option>
<option value="2024">2024</option>
<option value="2023">2023</option>
<option value="2022">2022</option>
<option value="2021">2021</option>
<option value="2020">2020</option>
</select>

<select id="colorFilter" onchange="renderCars()">
<option value="all">ALL COLOUR</option>
<option value="BLACK">BLACK</option>
<option value="WHITE">WHITE</option>
<option value="SILVER">SILVER</option>
<option value="GREY">GREY</option>
</select>

<select id="priceFilter" onchange="renderCars()">
<option value="all">ALL PRICE</option>
<option value="low">LOW → HIGH</option>
<option value="high">HIGH → LOW</option>
</select>

<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>🚗 APPLY LOAN REQUEST</h3>

<p id="loanCar"></p>
<p id="loanPrice"></p>

<input id="p_name" placeholder="👤 Nama">
<input id="p_job" placeholder="🖊️ Bekerja / Bisnes">
<input id="p_income" placeholder="💼 Gaji / Income">

<button class="send" onclick="sendLoan()">Hantar ke WhatsApp</button>
<button class="close" onclick="closePopup()">Tutup</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
